<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="../dist/output.css" rel="stylesheet" />
  <link rel="shortcut icon" href="../public/favicon.ico" type="image/x-icon" />
  <title>Exchange Calculator</title>
</head>

<body class="bg-gradient-to-r from-[#293774] to-[#5d3386]">
  <div class="p-4 mx-auto max-w-[1100px]">
    <form class="flex justify-center">
      <input type="number"
        class="border border-gray-600 outline-0 m-1 p-2 focus:ring-2 ring-pink-500 ring-inset rounded-md w-full max-w-[480px]"
        placeholder="Ingresar monto a cambiar" min="20" max="1000000" id="monto" />
      <button type="submit" id="button" class="bg-gray-800 text-white m-1 p-2 rounded-md">
        Calcular
      </button>
    </form>
    <div class="flex flex-row flex-wrap justify-center p-2 my-2 bg-gray-800 rounded-sm">
      <div class="m-2 p-2 bg-white rounded-md w-[300px]">
        <img src="./images/ontop.png" class="h-[60px] mx-auto" />
        <span class="block"><b>Flat fee:</b> -1,54 USD</span>
        <span class="block"><b>Comision de CCL:</b> -11%</span>
        <span class="block"><b>Other fee:</b> -6 USD</span>
        <div class="border-2 border-gray-600 bg-gray-700 max-w-[500px]"></div>
        <p id="total-ontop"><br /></p>
      </div>
      <div class="m-2 p-2 bg-white rounded-md w-[300px]">
        <img src="./images/lemon.png" class="h-[50px] mb-2.5 mx-auto" />
        <span class="block"><b>Comision de red BEP-20:</b> Min 1,2%</span>
        <span class="block"><b>Comision de Venta cripto:</b> -0,5%</span>
        <div class="border-2 border-gray-600 bg-gray-700 max-w-[500px]"></div>
        <p id="total-lemon"><br /></p>
      </div>
      <div class="m-2 p-2 bg-white rounded-md w-[300px]">
        <h3 class="block text-2xl p-0  text-center font-medium uppercase">
          Dolar Blue
        </h3>
        <p><b>Comision:</b>
          <input
            class="block border border-gray-600 outline-0 p-1 my-2 focus:ring-2 ring-pink-500 ring-inset rounded-md w-full "
            placeholder="Ingresar porcentaje de comision" min="0" max="100" id="comision" />
        <div class="border-2 border-gray-600 bg-gray-700 max-w-[500px]"></div>
        <p id="total-blue"><br /></p>
      </div>
      <div class="m-2">
        <iframe
          style="width:300px;height:260px;border-radius:10px;box-shadow:2px 4px 4px rgb(0 0 0 / 25%);display:flex;justify-content:center;border:1px solid #bcbcbc"
          src="https://dolarhoy.com/i/cotizaciones/dolar-blue" frameborder="0">
        </iframe>
      </div>
    </div>
    <div class="flex flex-row flex-wrap justify-center p-2 my-2 bg-gray-800 rounded-sm">
      <a class="text-white" target="_blank"
        href="https://diagnostic-llama-a8e.notion.site/Como-retirar-dinero-de-Ontop-mediante-criptomonedas-c5bd2b2d52ff4d70a11ed20b0eb36985">Guia
        de transferencia de criptomonedas</a>
    </div>
  </div>
</body>
<script src="../src/index.js"></script>

</html>
